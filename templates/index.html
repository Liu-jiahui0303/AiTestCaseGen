<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 测试用例生成器</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">AI 测试用例生成器</span>
  <span class="toolbar-spacer"></span>
  <span class="toolbar-info">模型:</span><span class="toolbar-prompt" id="toolbarModel">-</span>
  <span class="toolbar-info">提示词:</span><span class="toolbar-prompt" id="toolbarPrompt">-</span>
  <button class="theme-btn" id="chatBtn" onclick="openChat()">💬 AI 对话</button>
  <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">☀</button>
</div>

<div class="workspace">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-header" onclick="toggleSection(this)">API 配置</div>
      <div class="section-body">
        <div class="field"><label class="field-label">Base URL</label><input class="field-input" id="baseUrl" placeholder="https://api.deepseek.com/anthropic" spellcheck="false"></div>
        <div class="field"><label class="field-label">Model</label><input class="field-input" id="model" placeholder="deepseek-v4-pro[1M]" spellcheck="false"></div>
        <div class="field"><label class="field-label">API Key</label><input class="field-input" type="text" id="apiKey" placeholder="sk-..." spellcheck="false" autocomplete="off" style="-webkit-text-security:disc;"></div>
        <button class="btn btn-sm" onclick="saveConfig()">保存配置</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-header" onclick="toggleSection(this)">提示词</div>
      <div class="section-body">
        <div class="prompt-select-row" style="margin-bottom:6px;"><select class="prompt-select" id="promptSelect" onchange="onPromptSelect()"></select></div>
        <div class="prompt-select-row">
          <button class="btn btn-sm prompt-action" onclick="viewPrompt()" title="查看">👁</button>
          <button class="btn btn-sm prompt-action" onclick="editPrompt()" title="编辑">✎</button>
          <button class="btn btn-sm prompt-action" onclick="addPrompt()" title="新增">+</button>
          <button class="btn btn-sm prompt-action btn-danger" onclick="deletePrompt()" title="删除" style="margin-left:auto;">🗑</button>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1;display:flex;flex-direction:column;">
      <div class="section-header no-toggle">PRD 文档输入</div>
      <textarea class="prd-editor" id="prdInput" placeholder="在此粘贴 PRD 文档内容...

（Ctrl+Enter 换行，Enter 生成）" spellcheck="false" style="flex:1;border:none;" onkeydown="if(event.key==='Enter'){if(event.ctrlKey){event.target.value+='\n';event.preventDefault()}else{event.preventDefault();generate()}}"></textarea>
      <div style="padding:3px 10px;display:flex;gap:3px;flex-wrap:wrap;background:var(--gen-btn-area-bg);border-top:1px solid var(--gen-btn-area-border);">
        <span style="font-size:10px;color:var(--text-dim);line-height:22px;">示例:</span>
        <button class="btn btn-sm" onclick="loadTemplate('login')">登录</button>
        <button class="btn btn-sm" onclick="loadTemplate('shopcart')">购物车</button>
        <button class="btn btn-sm" onclick="loadTemplate('usermgmt')">用户管理</button>
        <button class="btn btn-sm" onclick="loadTemplate('order')">订单</button>
      </div>
      <div style="padding:3px 10px 6px;display:flex;gap:6px;background:var(--gen-btn-area-bg);">
        <button class="btn btn-primary" id="generateBtn" onclick="generate()" style="flex:1;justify-content:center;">▶ 生成测试用例</button>
        <button class="btn btn-sm btn-danger" id="stopBtn" onclick="stopGenerate()" title="停止生成" style="display:none;">■</button>
        <button class="btn btn-sm" onclick="exportExcel()" title="导出 Excel">📥</button>
        <button class="btn btn-sm" onclick="copyJSON()" title="复制 JSON">📋</button>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="tab-bar" id="sessionTabs">
      <div class="session-tab active" data-sid="s1" onclick="switchSession('s1')">会话 1</div>
      <div class="add-tab" onclick="addSession()" title="新建会话">＋</div>
    </div>
    <div class="result-area" id="resultArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">◻</div><div class="title">暂无测试用例</div>
        <div class="sub">在左侧面板粘贴 PRD 内容后点击「生成测试用例」</div>
      </div>
      <div class="stream-area" id="streamArea" style="display:none;"></div>
      <div id="resultCard" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="table-container"><table><thead><tr>
          <th style="width:72px;">编号</th><th style="width:90px;">模块</th><th style="min-width:160px;">标题</th>
          <th style="min-width:120px;">前置条件</th><th style="min-width:180px;">测试步骤</th><th style="min-width:180px;">预期结果</th><th style="width:80px;">类型</th><th style="width:56px;">优先级</th>
        </tr></thead><tbody id="tableBody"></tbody></table></div>
        <div class="statusbar" id="statsBar"><span>就绪</span></div>
      </div>
    </div>
  </div>

  <div class="resize-handle" id="rpResizeHandle"></div>
  <!-- ═══ 右侧详情面板 ═══ -->
  <div class="right-panel" id="rightPanel">
    <div class="rp-section">
      <div class="rp-section-header">📊 概览</div>
      <div class="rp-detail" id="rpStats">暂无数据</div>
    </div>
    <div class="rp-section" style="flex:1;display:flex;flex-direction:column;">
      <div class="rp-section-header">📂 用例目录</div>
      <div class="rp-tree" id="rpTree">
        <div class="rp-empty">生成用例后自动展示</div>
      </div>
    </div>
    <div class="rp-section" id="rpDetailSection" style="display:none;">
      <div class="rp-section-header">📋 用例详情</div>
      <div class="rp-detail" id="rpDetail"></div>
    </div>
  </div>
</div>

<!-- 提示词编辑模态框 -->
<div class="modal-overlay" id="promptModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-header"><span id="modalTitle">编辑提示词</span><span class="modal-header-spacer"></span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="field"><label class="field-label">名称</label><input class="field-input" id="editName"></div>
      <div class="field"><label class="field-label">System Prompt</label><textarea class="modal-textarea lg" id="editSystem"></textarea></div>
      <div class="field"><label class="field-label">User Template<span style="font-weight:400;text-transform:none;"> 变量: {prd_text}</span></label><textarea class="modal-textarea" id="editUser"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="modalDeleteBtn" style="display:none;margin-right:auto;" onclick="deleteCurrentPrompt()">删除</button>
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="savePrompt()">保存</button>
    </div>
  </div>
</div>

<!-- 聊天窗口 -->
<div class="modal-overlay" id="chatModal" style="display:none;" onclick="if(event.target===this)closeChat()">
  <div class="modal chat-modal"><div class="modal-header"><span>AI 对话</span><span class="modal-header-spacer"></span><span style="font-size:10px;color:var(--text-dim);margin-right:4px;" id="chatModelLabel"></span><button class="btn btn-sm" onclick="clearChat()" title="清空" style="margin-right:4px;">清空</button><button class="modal-close" onclick="closeChat()">✕</button></div>
    <div class="chat-area" id="chatArea"><div style="text-align:center;color:var(--empty-color);padding:40px 0;font-size:12px;">发送消息开始对话</div></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="chat-send-btn" id="chatSendBtn" onclick="sendChat()">发送</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script src="/static/app.js"></script>
</body>
</html>
